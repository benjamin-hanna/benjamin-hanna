name: Daily quine

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}
  push:
    paths:
      - "scripts/quine_update.py"

permissions:
  contents: write

jobs:
  update-quine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run quine updater
        run: python3 scripts/quine.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Daily rotation"
          git push